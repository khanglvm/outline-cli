name: npm-auto-publish

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - package.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: npm-auto-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Validate release secrets
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          OUTLINE_ENTRY_BUILD_KEY: ${{ secrets.OUTLINE_ENTRY_BUILD_KEY }}
        run: |
          set -euo pipefail
          test -n "${NPM_TOKEN:-}" || { echo "Missing required secret: NPM_TOKEN"; exit 1; }
          test -n "${OUTLINE_ENTRY_BUILD_KEY:-}" || { echo "Missing required secret: OUTLINE_ENTRY_BUILD_KEY"; exit 1; }

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine release strategy
        id: strategy
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          current_version="$(node -p "require('./package.json').version")"
          echo "current_version=${current_version}" >> "$GITHUB_OUTPUT"

          if [ -z "${BEFORE_SHA:-}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            echo "mode=patch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous_version="$(git show "${BEFORE_SHA}:package.json" | node -e "let input=''; process.stdin.on('data', (chunk) => input += chunk); process.stdin.on('end', () => process.stdout.write(JSON.parse(input).version || ''));")"
          echo "previous_version=${previous_version}" >> "$GITHUB_OUTPUT"

          if [ "${previous_version}" != "${current_version}" ]; then
            echo "mode=current" >> "$GITHUB_OUTPUT"
          else
            echo "mode=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish current version
        if: steps.strategy.outputs.mode == 'current'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          OUTLINE_ENTRY_BUILD_KEY: ${{ secrets.OUTLINE_ENTRY_BUILD_KEY }}
        run: npm run release -- --use-current-version --skip-test

      - name: Publish patch release
        if: steps.strategy.outputs.mode == 'patch'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          OUTLINE_ENTRY_BUILD_KEY: ${{ secrets.OUTLINE_ENTRY_BUILD_KEY }}
        run: npm run release -- --bump patch --skip-test
